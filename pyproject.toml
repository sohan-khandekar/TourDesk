[tool.pytest.ini_options]
pythonpath = ["backend"]
testpaths = ["backend/app/tests"]
addopts = "--cov=backend/app --cov-report=term-missing --cov-report=xml --cov-report=html"

[tool.ruff]
line-length = 88
target-version = "py312"
src = ["backend"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
