stages:
  - lint
  - type_check
  - test
  - coverage
  - security
  - release

default:
  image: node:24
  before_script:
    - npm install
    - npm --prefix frontend install

lint:
  stage: lint
  script:
    - npx biome check . || true
    - npx eslint frontend --ext .js,.jsx,.ts,.tsx || true

type_check:
  stage: type_check
  script:
    - npm --prefix frontend run typecheck

test:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install -r backend/requirements.txt
  script:
    - pytest

coverage:
  stage: coverage
  image: python:3.11-slim
  before_script:
    - pip install -r backend/requirements.txt
  script:
    - pytest
  artifacts:
    when: always
    paths:
      - htmlcov/
      - coverage.xml

dependency_audit:
  stage: security
  script:
    - npm audit --audit-level=critical || true
    - npm --prefix frontend audit --audit-level=critical || true
    - uv audit || pip-audit || true

secret_scan:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  before_script: []
  script:
    - gitleaks detect --source . --no-git --redact || true

changelog_config:
  stage: release
  script:
    - test -f cliff.toml
    - test -f CHANGELOG.md
