stages:
  - lint
  - format
  - type_check
  - test
  - coverage
  - security
  - release

default:
  image: node:24
  before_script:
    - npm install
    - npm --prefix frontend install

lint:
  stage: lint
  script:
    - npx biome check . || true
    - npx eslint frontend --ext .js,.jsx,.ts,.tsx || true

format:
  stage: format
  image: python:3.11-slim
  before_script:
    - pip install ruff
  script:
    - ruff format --check backend/
    - ruff check backend/

type_check_python:
  stage: type_check
  image: python:3.11-slim
  before_script:
    - pip install mypy pydantic
  script:
    - mypy backend/app --ignore-missing-imports

type_check_js:
  stage: type_check
  image: node:24
  before_script:
    - npm install
    - npm --prefix frontend install
  script:
    - npm --prefix frontend run typecheck

test:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install -r backend/requirements.txt
  script:
    - pytest

coverage:
  stage: coverage
  image: python:3.11-slim
  before_script:
    - pip install -r backend/requirements.txt
  script:
    - pytest --cov=backend/app --cov-report=term-missing --cov-report=xml --cov-report=html
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - htmlcov/
      - coverage.xml

dependency_audit:
  stage: security
  script:
    - npm audit --audit-level=critical || true
    - npm --prefix frontend audit --audit-level=critical || true
    - uv audit || pip-audit || true

secret_scan:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  before_script: []
  script:
    - gitleaks detect --source . --no-git --redact || true

changelog_config:
  stage: release
  script:
    - test -f cliff.toml
    - test -f CHANGELOG.md
