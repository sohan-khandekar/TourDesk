stages:
  - lint
  - type_check
  - test
  - coverage
  - security
  - release

default:
  image: node:24
  before_script:
    - npm install
    - npm --prefix frontend install

lint:
  stage: lint
  script:
    - npx biome check . || true
    - npx eslint frontend --ext .js,.jsx,.ts,.tsx || true

type_check:
  stage: type_check
  script:
    - npm --prefix frontend run typecheck

test:
  stage: test
  script:
    - npm run test || true

coverage:
  stage: coverage
  script:
    - npm run test:coverage || true
  artifacts:
    when: always
    paths:
      - coverage/

dependency_audit:
  stage: security
  script:
    - npm --prefix frontend audit --audit-level=critical || true

secret_scan:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  before_script: []
  script:
    - gitleaks detect --source . --no-git --redact || true

changelog_config:
  stage: release
  script:
    - test -f cliff.toml
    - test -f CHANGELOG.md
